services:
  - type: web
    name: deep-factual-research
    runtime: node
    repo: https://github.com/wa9-cpu/news
    rootDir: project/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1
      - key: SEARCH_API_KEY
        sync: false
      - key: SEARCH_API_PROVIDER
        value: serper
      - key: NANOBANANA_API_KEY
        sync: false
